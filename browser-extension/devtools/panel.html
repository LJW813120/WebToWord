<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>API面板</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .toolbar {
      background: #252526;
      padding: 10px;
      border-bottom: 1px solid #3c3c3c;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    
    button {
      background: #0e639c;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
    }
    
    button:hover {
      background: #1177bb;
    }
    
    button:disabled {
      background: #3c3c3c;
      cursor: not-allowed;
    }
    
    button.danger {
      background: #c53030;
    }
    
    button.danger:hover {
      background: #e53e3e;
    }
    
    .requests-container {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    
    .request-item {
      background: #252526;
      padding: 10px;
      margin-bottom: 5px;
      border-radius: 3px;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    
    .request-item:hover {
      background: #2d2d2d;
    }
    
    .request-item.selected {
      border-left-color: #0e639c;
      background: #2d2d2d;
    }
    
    .request-method {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 2px;
      font-size: 11px;
      font-weight: 600;
      margin-right: 8px;
    }
    
    .method-get { background: #2d5a27; color: #a5d6a7; }
    .method-post { background: #1e4d6b; color: #81d4fa; }
    .method-put { background: #6b5a1e; color: #ffe082; }
    .method-delete { background: #6b1e1e; color: #ef9a9a; }
    
    .request-url {
      font-size: 12px;
      color: #d4d4d4;
    }
    
    .request-details {
      display: none;
      margin-top: 10px;
      padding: 10px;
      background: #1e1e1e;
      border-radius: 3px;
      font-size: 11px;
    }
    
    .request-item.expanded .request-details {
      display: block;
    }
    
    .detail-section {
      margin-bottom: 10px;
    }
    
    .detail-section h4 {
      color: #9cdcfe;
      margin-bottom: 5px;
      font-size: 11px;
    }
    
    .detail-section pre {
      background: #1e1e1e;
      padding: 8px;
      border-radius: 3px;
      overflow-x: auto;
      font-size: 11px;
    }
    
    .status-bar {
      background: #252526;
      padding: 5px 10px;
      border-top: 1px solid #3c3c3c;
      font-size: 11px;
      display: flex;
      justify-content: space-between;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #858585;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="startBtn">开始捕获</button>
    <button id="stopBtn" class="danger" disabled>停止捕获</button>
    <button id="clearBtn">清空列表</button>
    <button id="uploadBtn" disabled>上传到服务器</button>
  </div>
  
  <div class="requests-container" id="requestsContainer">
    <div class="empty-state">点击"开始捕获"开始监控API请求</div>
  </div>
  
  <div class="status-bar">
    <span id="statusText">就绪</span>
    <span id="countText">已捕获: 0</span>
  </div>
  
  <script src="panel.js"></script>
</body>
</html>
